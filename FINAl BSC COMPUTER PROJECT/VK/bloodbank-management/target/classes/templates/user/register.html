<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - Blood Bank</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-container">
        <div class="login-box" style="max-width: 600px;">
            <div class="blood-icon">
                📝
            </div>
            <div class="login-header">
                <h2>User Registration</h2>
                <p>Create your account to access blood bank services</p>
            </div>
            
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            
            <form th:action="@{/user/register}" method="post" th:object="${user}">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" th:field="*{username}" placeholder="Choose username" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" th:field="*{password}" placeholder="Enter password" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" th:field="*{fullName}" placeholder="Enter full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" th:field="*{email}" placeholder="Enter email" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" th:field="*{phone}" placeholder="Enter phone number">
                    </div>
                    
                    <div class="form-group">
                        <label>Blood Group</label>
                        <select th:field="*{bloodGroup}">
                            <option value="">Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" th:field="*{age}" placeholder="Enter age" min="18" max="65">
                    </div>
                    
                    <div class="form-group">
                        <label>Gender</label>
                        <select th:field="*{gender}">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Address</label>
                    <textarea th:field="*{address}" placeholder="Enter address" rows="2"></textarea>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" th:field="*{city}" placeholder="Enter city">
                    </div>
                    
                    <div class="form-group">
                        <label>State</label>
                        <input type="text" th:field="*{state}" placeholder="Enter state">
                    </div>
                </div>
                
                <div class="form-group">
                    <p style="color: #666; font-size: 12px;">* Required fields</p>
                </div>
                
                <button type="submit" class="btn btn-primary">Register</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <p>Already have an account? <a th:href="@{/user/login}" style="color: var(--primary-color);">Login here</a></p>
                <a th:href="@{/}" style="color: var(--primary-color);">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
