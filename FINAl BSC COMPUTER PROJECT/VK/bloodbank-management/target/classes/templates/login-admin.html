<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Blood Bank</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="blood-icon">
                👤
            </div>
            <div class="login-header">
                <h2>Admin Login</h2>
                <p>Access the administration panel</p>
            </div>
            
            <div th:if="${param.error}" class="alert alert-danger">
                Invalid username or password
            </div>
            
            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out successfully
            </div>
            
            <form th:action="@{/admin/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required autofocus>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <div class="form-group">
                    <p style="color: #666; font-size: 12px; margin-bottom: 5px;">
                        Default Admin: username: admin1 | password: admin123@
                    </p>
                </div>
                
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <a th:href="@{/}" style="color: var(--primary-color);">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
